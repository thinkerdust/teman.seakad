services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: teman_seakad_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    networks:
      - teman_seakad_network

  webserver:
    image: nginx:alpine
    container_name: teman_seakad_webserver
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - teman_seakad_network
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: teman_seakad_db
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: teman_seakad
      MYSQL_USER: teman_user
      MYSQL_PASSWORD: teman_password
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - teman_seakad_db_data:/var/lib/mysql
    networks:
      - teman_seakad_network

networks:
  teman_seakad_network:
    driver: bridge

volumes:
  teman_seakad_db_data:
    driver: local
